<div class="container mt-4">
  <div class="alert alert-success text-center" *ngIf="successMessage">
      ✅ Room created successfully!
    </div>
  <form [formGroup]="roomForm" (ngSubmit)="onSubmit()" class="card p-4 shadow">

    <h3 class="mb-4 text-center">Room Details</h3>

    <div class="row g-3">

      <!-- Room Type -->
      <div class="col-md-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Room Type</mat-label>
          <input matInput formControlName="roomType">
          <mat-icon matSuffix>hotel</mat-icon>
        </mat-form-field>
      </div>

      <!-- Amenities -->
      <div class="col-md-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Amenities</mat-label>
          <input matInput formControlName="amenities">
          <mat-icon matSuffix>weekend</mat-icon>
        </mat-form-field>
      </div>

      <!-- Price -->
      <div class="col-md-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Price</mat-label>
          <input matInput type="number" formControlName="price">
          <mat-icon matSuffix>currency_rupee</mat-icon>
        </mat-form-field>
      </div>

      <!-- Ratings -->
      <div class="col-md-6">

        <label class="form-label d-block">Ratings</label>

        <div class="rating-stars">
          <mat-icon
            *ngFor="let star of [1,2,3,4,5]"
            (click)="roomForm.patchValue({ratings: star})"
            [class.active]="star <= (roomForm.value.ratings ?? 0)">
            star
          </mat-icon>
        </div>

      </div>

      <!-- Image URL -->
      <div class="col-md-12">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Room Image URL</mat-label>
          <input matInput formControlName="url" [(ngModel)]="room.photos">
          <mat-icon matSuffix>image</mat-icon>
        </mat-form-field>
      </div>

      <!-- Image Preview -->
      <div class="col-md-12 text-center" *ngIf="roomForm.value.url">
        <img
          [src]="roomForm.value.url"
          class="img-preview shadow rounded">
      </div>

      <!-- Checkout Time -->
      <div class="col-md-6">
        <mat-form-field appearance="outline" class="w-100">
          <mat-label>Checkout Time</mat-label>

          <input
            matInput
            [matDatepicker]="picker"
            formControlName="checkOutTime">

          <mat-datepicker-toggle matSuffix [for]="picker"></mat-datepicker-toggle>
          <mat-datepicker #picker></mat-datepicker>

        </mat-form-field>
      </div>

    </div>

    <!-- Submit -->
    <div class="mt-4">
      <button
        class="btn btn-primary w-100"
        type="submit"
        [disabled]="roomForm.invalid">

        Save Room
      </button>
    </div>

  </form>

</div>
